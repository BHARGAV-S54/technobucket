{% extends 'base.html' %}

{% block title %}Admin Login - Nexio Labs{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card bg-secondary bg-opacity-10 border-secondary">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <img src="{% static 'images/logo.png' %}" alt="Nexio Labs" width="100" class="mb-3">
                            <h3 class="mt-3">Admin Login</h3>
                            <p class="text-secondary small">Enter your credentials to access the dashboard</p>
                        </div>
                        
                        <form method="POST" action="{% url 'admin_login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                            </div>
                            <button type="submit" class="btn w-100" style="background: linear-gradient(135deg, #06b6d4, #2563eb); border: none;">
                                <i class="bi bi-box-arrow-in-right me-2"></i> Login
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="{% url 'home' %}" class="text-secondary text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
